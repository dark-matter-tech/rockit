# Rockit IntelliJ Plugin Configuration
pluginGroup = com.darkmatter.rockit
pluginName = Rockit Language Support
pluginRepositoryUrl = https://github.com/Dark-Matter/moon
pluginVersion = 0.1.0

# Supported build number ranges
# https://plugins.jetbrains.com/docs/intellij/build-number-ranges.html
pluginSinceBuild = 233

# IntelliJ Platform
platformVersion = 2023.3

# Plugin Dependencies
platformPlugins =
platformBundledPlugins =

# Gradle
gradleVersion = 8.13

# Opt-out of bundling Kotlin stdlib
kotlin.stdlib.default.dependency = false

# Enable Gradle Configuration Cache
org.gradle.configuration-cache = true

# Enable Gradle Build Cache
org.gradle.caching = true
