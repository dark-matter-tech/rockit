name: CI

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    container: swift:5.10.1-jammy
    defaults:
      run:
        shell: bash

    steps:
      - name: 🔧 Install dependencies
        run: |
          echo ""
          echo "🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀"
          echo "🚀                                                        🚀"
          echo "🚀    ██████   ██████   ██████ ██   ██ ██ ████████        🚀"
          echo "🚀    ██   ██ ██    ██ ██      ██  ██  ██    ██           🚀"
          echo "🚀    ██████  ██    ██ ██      █████   ██    ██           🚀"
          echo "🚀    ██   ██ ██    ██ ██      ██  ██  ██    ██           🚀"
          echo "🚀    ██   ██  ██████   ██████ ██   ██ ██    ██           🚀"
          echo "🚀                                                        🚀"
          echo "🚀        C O M P I L E R   P I P E L I N E               🚀"
          echo "🚀        Dark Matter Tech — Codename Mars                🚀"
          echo "🚀                                                        🚀"
          echo "🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀"
          echo ""

          # === ROCKET LAUNCH SEQUENCE ===
          echo "  Initiating launch sequence..."
          sleep 0.3
          echo ""
          echo "  T-3..."
          sleep 0.3
          echo "  T-2..."
          sleep 0.3
          echo "  T-1..."
          sleep 0.3
          echo ""
          echo "        /\\"
          echo "       /  \\"
          echo "      / RK \\"
          echo "     /______\\"
          echo "    |  ||||  |"
          echo "    +--------+"
          echo "       ^^^^"
          echo "     ON THE PAD"
          sleep 0.5
          echo ""
          echo "        /\\"
          echo "       /  \\"
          echo "      / RK \\"
          echo "     /______\\"
          echo "    |  ||||  |"
          echo "    +--------+"
          echo "     \\######/"
          echo "      \\####/"
          echo "       \\##/"
          echo "     IGNITION!"
          sleep 0.5
          echo ""
          echo "           *"
          echo "        . /\\ ."
          echo "       * /  \\ *"
          echo "        / RK \\"
          echo "       /______\\"
          echo "       +------+"
          echo "        \\####/"
          echo "         \\##/"
          echo "          \\/  "
          echo "       . * . *"
          echo "      * . * . *"
          echo "     . * . * . *"
          echo "      LIFTOFF!"
          sleep 0.5
          echo ""
          echo "              *        .    *"
          echo "         .       *  .     .   *"
          echo "       *    .  *    .  *    ."
          echo "                  /\\"
          echo "                 /RK\\"
          echo "                +----+"
          echo "                 \\##/"
          echo "       .    *    .    *    .    *"
          echo "    *    .    *    .    *    .   "
          echo "     WE HAVE CLEARED THE TOWER"
          sleep 0.3
          echo ""

          echo "🔧 Installing build dependencies..."
          apt-get update && apt-get install -y --no-install-recommends git libssl-dev pkg-config
          # Use existing clang from Swift container if available, else install clang-15
          if command -v clang > /dev/null 2>&1; then
            echo "  ✅ clang already available: $(clang --version | head -1)"
          else
            # Free space before installing clang-15 (llvm-15-dev is 670MB)
            rm -rf /usr/share/doc /usr/share/man /usr/share/locale /var/cache/apt/archives
            apt-get install -y --no-install-recommends clang-15
            ln -sf /usr/bin/clang-15 /usr/bin/clang
          fi
          apt-get clean && rm -rf /var/lib/apt/lists/*
          echo "✅ Dependencies installed (clang: $(clang --version | head -1), git)"
          echo ""

      - name: 📦 Checkout
        run: |
          echo "📦 Cloning repository..."
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          echo "machine ${GITHUB_SERVER_URL#https://} login x-access-token password ${GITHUB_TOKEN}" > ~/.netrc
          chmod 600 ~/.netrc
          BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          git clone --depth 1 --recurse-submodules --branch "${BRANCH}" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" .
          echo "✅ Checked out branch: ${BRANCH}"
          echo "   Commit: $(git rev-parse --short HEAD)"
          echo ""
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: 🧪 Run unit tests
        working-directory: RockitCompiler
        run: |
          set -eo pipefail
          echo ""
          echo "┌─────────────────────────────────────────────┐"
          echo "│  🧪  STAGE 1/4 — UNIT TESTS                 │"
          echo "└─────────────────────────────────────────────┘"
          echo ""
          echo "🔬 Running test suite..."
          START=$(date +%s)
          swift test 2>&1 | tee test-output.log
          END=$(date +%s)
          ELAPSED=$((END - START))
          PASSED=$(grep -c "passed" test-output.log || echo "?")
          echo ""
          # --- progress bar animation ---
          echo "  [░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░] 0%"
          sleep 0.08
          echo "  [████████░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░] 20%"
          sleep 0.08
          echo "  [████████████████░░░░░░░░░░░░░░░░░░░░░░░░░] 40%"
          sleep 0.08
          echo "  [████████████████████████░░░░░░░░░░░░░░░░░░] 60%"
          sleep 0.08
          echo "  [████████████████████████████████░░░░░░░░░░] 80%"
          sleep 0.08
          echo "  [████████████████████████████████████████░░] 95%"
          sleep 0.08
          echo "  [██████████████████████████████████████████] 100%"
          echo ""
          echo "  ⏱️  Tests completed in ${ELAPSED}s"
          echo "  ✅ Unit tests passed"
          echo ""

      - name: 🏗️ Build Stage 0 (Swift)
        working-directory: RockitCompiler
        run: |
          set -eo pipefail
          echo ""
          echo "┌─────────────────────────────────────────────┐"
          echo "│  🏗️  STAGE 2/4 — BUILD STAGE 0 COMPILER     │"
          echo "└─────────────────────────────────────────────┘"
          echo ""
          # Free memory from debug build (unit tests already passed)
          rm -rf .build/debug
          echo "🔨 Compiling Stage 0 (Swift → native)..."
          START=$(date +%s)
          swift build -c release 2>&1 | tee build-output.log
          END=$(date +%s)
          ELAPSED=$((END - START))
          echo ""
          # --- anvil animation ---
          echo "       _____"
          echo "      |     |    Forging the compiler..."
          echo "      |  S  |"
          echo "      | W I |"
          echo "      | F T |"
          echo "      |_____|"
          echo "     /       \\"
          echo "    /  #####  \\"
          echo "   /___________\\"
          echo "   |  |||||||  |"
          echo "   +===========+"
          sleep 0.3
          echo ""
          # --- progress bar ---
          echo "  [░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░] 0%"
          sleep 0.08
          echo "  [██████████░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░] 25%"
          sleep 0.08
          echo "  [████████████████████░░░░░░░░░░░░░░░░░░░░░░] 50%"
          sleep 0.08
          echo "  [██████████████████████████████░░░░░░░░░░░░] 75%"
          sleep 0.08
          echo "  [██████████████████████████████████████████] 100%"
          echo ""
          echo "  ⏱️  Build completed in ${ELAPSED}s"
          echo "  ✅ Stage 0 compiler ready"
          echo "  📍 .build/release/rockit"
          echo ""

      - name: 🧫 Run Probe test suites
        working-directory: RockitCompiler
        continue-on-error: true
        run: |
          set -eo pipefail
          echo ""
          echo "┌─────────────────────────────────────────────┐"
          echo "│  🧫  STAGE 2.5/4 — PROBE TEST RUNNER         │"
          echo "└─────────────────────────────────────────────┘"
          echo ""
          ROCKIT=.build/release/rockit
          if [ ! -f "$ROCKIT" ]; then
            echo "  ⚠️  Binary not found at $ROCKIT — skipping Probe tests"
            exit 1
          fi
          if [ ! -d "tests" ]; then
            echo "  ⚠️  No tests/ directory — skipping Probe tests"
            exit 0
          fi
          START=$(date +%s)

          # Run tests file-by-file to avoid OOM (each test gets its own process)
          echo "  Running Probe test suite (tests/ recursive, excluding advanced/ and lib/)..."
          PASS=0; FAIL=0; TOTAL=0
          FAILED_TESTS=""
          for f in $(find tests -name '*.rok' -not -path '*/advanced/*' -not -path '*/lib/*' | sort); do
            name=$(basename "$f" .rok)
            TOTAL=$((TOTAL + 1))
            if $ROCKIT test "$f" 2>&1 | tee -a probe-output.log | grep -q "PASS"; then
              PASS=$((PASS + 1))
            else
              FAIL=$((FAIL + 1))
              FAILED_TESTS="$FAILED_TESTS\n    $name"
            fi
          done
          echo ""
          if [ "$FAIL" -eq 0 ]; then
            echo "  ✅ All $PASS/$TOTAL Probe tests passed"
          else
            echo "  💀 FAILURES: $FAIL/$TOTAL failed"
            printf "$FAILED_TESTS\n"
            exit 1
          fi

          END=$(date +%s)
          ELAPSED=$((END - START))
          echo "  ⏱️  Probe tests completed in ${ELAPSED}s"
          echo ""

      - name: 🎯 Run native feature tests
        working-directory: RockitCompiler
        run: |
          echo ""
          echo "┌─────────────────────────────────────────────┐"
          echo "│  🎯  STAGE 3/4 — NATIVE FEATURE TESTS       │"
          echo "└─────────────────────────────────────────────┘"
          echo ""
          ROCKIT=.build/release/rockit
          PASS=0; FAIL=0; TOTAL=0
          FAILED_TESTS=""
          FEATURES=""
          START=$(date +%s)
          for f in examples/test_*.rok; do
            name=$(basename "$f" .rok)
            # Skip Stage 1-only tests (compiled with Stage 1 binary after bootstrap)
            case "$name" in test_unsafe*|test_crepr*|test_funptr*|test_freestanding*|test_byte_ops*|test_stdlib_*) echo "  ┌──────────────────────────────────────────────"; printf "  │ ⏭️  %-42s" "$name"; echo "⏭️  SKIP (Stage 1 only)"; echo "  └──────────────────────────────────────────────"; continue;; esac
            TOTAL=$((TOTAL + 1))
            echo "  ┌──────────────────────────────────────────────"
            printf "  │ 🚀 %-42s" "$name"
            if $ROCKIT build-native "$f" > /tmp/build_log 2>&1; then
              output=$("examples/$name" 2>&1) || true
              echo "✅ PASS"
              if [ -n "$output" ]; then
                echo "$output" | while IFS= read -r line; do
                  echo "  │   📟 $line"
                done
              fi
              PASS=$((PASS + 1))
              # Tag which feature was tested
              case "$name" in
                *interp*)      FEATURES="$FEATURES 🔤 string-interpolation" ;;
                *for*)         FEATURES="$FEATURES 🔁 for-loops" ;;
                *lambda*)      FEATURES="$FEATURES 🎭 lambdas" ;;
                *when*)        FEATURES="$FEATURES 🔀 when-expressions" ;;
                *nullable*)    FEATURES="$FEATURES ❓ null-safety" ;;
                *enum*)        FEATURES="$FEATURES 🏷️ enums" ;;
                *default*)     FEATURES="$FEATURES 📋 default-params" ;;
                *sealed*)      FEATURES="$FEATURES 🔒 sealed-classes" ;;
                *extension*)   FEATURES="$FEATURES 🔌 extensions" ;;
                *dataclass*)   FEATURES="$FEATURES 📦 data-classes" ;;
                *type_check*)  FEATURES="$FEATURES 🔍 type-checks" ;;
                *poly*)        FEATURES="$FEATURES 🧬 polymorphism" ;;
                *actor*)       FEATURES="$FEATURES 🎭 actors" ;;
                *codegen*)     FEATURES="$FEATURES ⚙️ codegen-ops" ;;
                *class*)       FEATURES="$FEATURES 🏗️ classes" ;;
                *collect*)     FEATURES="$FEATURES 📚 collections" ;;
                *control*)     FEATURES="$FEATURES 🚦 control-flow" ;;
                *except*)      FEATURES="$FEATURES 🛡️ exceptions" ;;
                *string*)      FEATURES="$FEATURES 🧵 strings" ;;
                *feature*)     FEATURES="$FEATURES 🌟 core-features" ;;
                *)             FEATURES="$FEATURES 🔧 $name" ;;
              esac
            else
              echo "❌ FAIL"
              echo "  │   💥 Build log:"
              cat /tmp/build_log | while IFS= read -r line; do
                echo "  │   💥 $line"
              done
              FAIL=$((FAIL + 1))
              FAILED_TESTS="$FAILED_TESTS\n    💥 $name"
            fi
            echo "  └──────────────────────────────────────────────"
          done
          END=$(date +%s)
          ELAPSED=$((END - START))
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          if [ "$FAIL" -eq 0 ]; then
            echo "  🏆 ALL TESTS PASSED: $PASS/$TOTAL"
            echo ""
            echo "  🛸 Features verified on Linux x86_64:"
            for feat in $FEATURES; do
              case "$feat" in
                🔤|🔁|🎭|🔀|❓|🏷️|📋|🔒|🔌|📦|🔍|🧬|⚙️|🏗️|📚|🚦|🛡️|🧵|🌟|🔧)
                  printf "    %s " "$feat" ;;
                *)
                  printf "%s " "$feat" ;;
              esac
            done
            echo ""
          else
            echo "  💀 FAILURES: $FAIL/$TOTAL failed"
            printf "$FAILED_TESTS\n"
          fi
          echo "  ⏱️  Completed in ${ELAPSED}s"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          [ "$FAIL" -eq 0 ] || exit 1

      - name: 🚀 Bootstrap self-hosting compiler
        working-directory: RockitCompiler
        run: |
          echo ""
          echo "┌─────────────────────────────────────────────┐"
          echo "│  🚀  STAGE 4/4 — SELF-HOSTING BOOTSTRAP     │"
          echo "└─────────────────────────────────────────────┘"
          echo ""
          echo "  Rockit compiles Rockit compiles Rockit."
          echo "  Three stages. Zero external dependencies."
          echo ""
          ROCKIT=.build/release/rockit
          TRIPLE="x86_64-unknown-linux-gnu"
          TOTAL_START=$(date +%s)

          # ============================================================
          # STAGE 0 -> STAGE 1
          # ============================================================
          echo "  ╔═══════════════════════════════════════════╗"
          echo "  ║  🔥 Stage 0 → Stage 1                     ║"
          echo "  ║  Swift compiler builds Rockit compiler    ║"
          echo "  ╚═══════════════════════════════════════════╝"
          START=$(date +%s)
          $ROCKIT build-native self-hosted-rockit/command.rok 2>&1
          END=$(date +%s)
          echo "  ✅ Stage 1 built ($(($END - $START))s)"
          echo ""
          # --- Tower: Foundation ---
          sleep 0.2
          echo "       ┌─────────────┐"
          echo "       │   STAGE 1   │"
          echo "       ├─────────────┤"
          echo "       │ ░░░░░░░░░░░ │"
          echo "       │ ░░░░░░░░░░░ │"
          echo "  ═════╧═════════════╧═════"
          echo ""
          sleep 0.3

          # ============================================================
          # Build Rockit runtime .o (needed for all subsequent steps)
          # ============================================================
          echo "  ╔═══════════════════════════════════════════╗"
          echo "  ║  ⚙️  Building Rockit Runtime (.o)          ║"
          echo "  ╚═══════════════════════════════════════════╝"
          bash runtime/rockit/build.sh 2>&1
          echo "  ✅ rockit_runtime.o built"
          echo ""

          # ============================================================
          # STAGE 1 -> STAGE 2 (bytecode self-compilation)
          # ============================================================
          # Verify Stage 1 can compile itself to bytecode.
          # We skip native Stage 2 build (clang takes 10-25 min on slow
          # runners). The bytecode self-compilation proves Stage 1 is
          # functionally correct. Full native fixed-point verification
          # (Stage 2 == Stage 3) runs in the release workflow.
          echo "  ╔═══════════════════════════════════════════╗"
          echo "  ║  🔥🔥 Stage 1 → Stage 2 (bytecode)        ║"
          echo "  ║  Rockit compiler compiles itself          ║"
          echo "  ╚═══════════════════════════════════════════╝"
          START=$(date +%s)
          self-hosted-rockit/command compile self-hosted-rockit/command.rok -o /tmp/stage2.rokb 2>&1
          END=$(date +%s)
          STAGE2_HASH=$(shasum -a 256 /tmp/stage2.rokb | awk '{print $1}')
          echo "  ✅ Stage 2 bytecode generated ($(($END - $START))s)"
          echo "  📍 SHA-256: ${STAGE2_HASH}"
          echo ""

          TOTAL_END=$(date +%s)
          TOTAL_ELAPSED=$((TOTAL_END - TOTAL_START))
          echo "🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀"
          echo "🚀                                                        🚀"
          echo "🚀   ✅  BOOTSTRAP COMPLETE                               🚀"
          printf "🚀   %-53s🚀\n" "Built in ${TOTAL_ELAPSED}s"
          echo "🚀   Rockit is self-hosting.                              🚀"
          echo "🚀                                                        🚀"
          echo "🚀   Stage 0 (Swift) ─── compiled ──▶ Stage 1 (native)    🚀"
          echo "🚀   Stage 1 ─────────── compiled ──▶ Stage 2 (bytecode)  🚀"
          echo "🚀   Self-compilation verified ✅                         🚀"
          echo "🚀                                                        🚀"
          echo "🚀   Zero external dependencies. Pure Rockit.             🚀"
          echo "🚀                                                        🚀"
          echo "🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀"

          # ============================================================
          # Stage 1-only feature tests (unsafe, extern, etc.)
          # ============================================================
          echo ""
          echo "  ╔═══════════════════════════════════════════╗"
          echo "  ║  🔬 Stage 1 Feature Tests                  ║"
          echo "  ╚═══════════════════════════════════════════╝"
          STAGE1_CMD=self-hosted-rockit/command
          S1_PASS=0; S1_FAIL=0; S1_TOTAL=0
          S1_FAILED=""
          for f in examples/test_unsafe*.rok examples/test_crepr*.rok examples/test_funptr*.rok; do
            [ -f "$f" ] || continue
            S1_TOTAL=$((S1_TOTAL + 1))
            name=$(basename "$f" .rok)
            echo "  ┌──────────────────────────────────────────────"
            printf "  │ 🔬 %-42s" "$name"
            if $STAGE1_CMD build-native "$f" -o "examples/$name" --runtime-path runtime/rockit_runtime.o --target-triple $TRIPLE > /tmp/s1_build_log 2>&1; then
              output=$("examples/$name" 2>&1) || true
              echo "✅ PASS"
              if [ -n "$output" ]; then
                echo "$output" | while IFS= read -r line; do
                  echo "  │   📟 $line"
                done
              fi
              S1_PASS=$((S1_PASS + 1))
            else
              echo "❌ FAIL"
              cat /tmp/s1_build_log | while IFS= read -r line; do
                echo "  │   💥 $line"
              done
              S1_FAIL=$((S1_FAIL + 1))
              S1_FAILED="$S1_FAILED\n    💥 $name"
            fi
            echo "  └──────────────────────────────────────────────"
          done
          if [ "$S1_TOTAL" -gt 0 ]; then
            if [ "$S1_FAIL" -eq 0 ]; then
              echo "  ✅ Stage 1 tests: $S1_PASS/$S1_TOTAL passed"
            else
              echo "  💀 Stage 1 tests: $S1_FAIL/$S1_TOTAL failed"
              printf "$S1_FAILED\n"
              exit 1
            fi
          fi

          # ============================================================
          # Consistency Verification
          # ============================================================

          # Verify command.rok matches concatenated Stage 1 modules
          # (filter out build identity lines which change every build)
          echo "  Verifying Stage 1 command.rok consistency..."
          cp self-hosted-rockit/command.rok /tmp/command_before.rok
          bash self-hosted-rockit/build.sh > /dev/null 2>&1
          grep -v 'val ROCKIT_' /tmp/command_before.rok > /tmp/cmd_a.rok || true
          grep -v 'val ROCKIT_' self-hosted-rockit/command.rok > /tmp/cmd_b.rok || true
          if diff /tmp/cmd_a.rok /tmp/cmd_b.rok > /dev/null 2>&1; then
            echo "  ✅ command.rok matches source modules"
          else
            echo "  ❌ command.rok is out of sync with Stage 1 modules!"
            echo "     Run: bash self-hosted-rockit/build.sh"
            diff /tmp/cmd_a.rok /tmp/cmd_b.rok | head -20
            exit 1
          fi
          echo ""

          # ============================================================
          # Standard Library Tests (require --lib-path)
          # ============================================================
          echo ""
          echo "  ╔═══════════════════════════════════════════╗"
          echo "  ║  📚 Standard Library Tests                 ║"
          echo "  ╚═══════════════════════════════════════════╝"
          SL_PASS=0; SL_FAIL=0; SL_TOTAL=0
          SL_FAILED=""
          for f in examples/test_stdlib_*.rok; do
            [ -f "$f" ] || continue
            SL_TOTAL=$((SL_TOTAL + 1))
            name=$(basename "$f" .rok)
            echo "  ┌──────────────────────────────────────────────"
            printf "  │ 📚 %-42s" "$name"
            if $STAGE1_CMD build-native "$f" -o "examples/$name" --lib-path self-hosted-rockit/stdlib --runtime-path runtime/rockit_runtime.o --target-triple $TRIPLE > /tmp/sl_build_log 2>&1; then
              output=$("examples/$name" 2>&1) || true
              echo "✅ PASS"
              if [ -n "$output" ]; then
                echo "$output" | while IFS= read -r line; do
                  echo "  │   📟 $line"
                done
              fi
              SL_PASS=$((SL_PASS + 1))
            else
              echo "❌ FAIL"
              cat /tmp/sl_build_log | while IFS= read -r line; do
                echo "  │   💥 $line"
              done
              SL_FAIL=$((SL_FAIL + 1))
              SL_FAILED="$SL_FAILED\n    💥 $name"
            fi
            echo "  └──────────────────────────────────────────────"
          done
          if [ "$SL_TOTAL" -gt 0 ]; then
            if [ "$SL_FAIL" -eq 0 ]; then
              echo "  ✅ Stdlib tests: $SL_PASS/$SL_TOTAL passed"
            else
              echo "  💀 Stdlib tests: $SL_FAIL/$SL_TOTAL failed"
              printf "$SL_FAILED\n"
              exit 1
            fi
          fi
