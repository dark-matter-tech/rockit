name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    container: swift:5.10.1-jammy

    steps:
      - name: 🔧 Install dependencies
        run: |
          echo ""
          echo "🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀"
          echo "🚀                                                        🚀"
          echo "🚀    ██████   ██████   ██████ ██   ██ ██ ████████        🚀"
          echo "🚀    ██   ██ ██    ██ ██      ██  ██  ██    ██           🚀"
          echo "🚀    ██████  ██    ██ ██      █████   ██    ██           🚀"
          echo "🚀    ██   ██ ██    ██ ██      ██  ██  ██    ██           🚀"
          echo "🚀    ██   ██  ██████   ██████ ██   ██ ██    ██           🚀"
          echo "🚀                                                        🚀"
          echo "🚀        C O M P I L E R   P I P E L I N E               🚀"
          echo "🚀        Dark Matter Tech — Codename Mars                🚀"
          echo "🚀                                                        🚀"
          echo "🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀"
          echo ""

          # === ROCKET LAUNCH SEQUENCE ===
          echo "  Initiating launch sequence..."
          sleep 0.3
          echo ""
          echo "  T-3..."
          sleep 0.3
          echo "  T-2..."
          sleep 0.3
          echo "  T-1..."
          sleep 0.3
          echo ""
          echo "        /\\"
          echo "       /  \\"
          echo "      / RK \\"
          echo "     /______\\"
          echo "    |  ||||  |"
          echo "    +--------+"
          echo "       ^^^^"
          echo "     ON THE PAD"
          sleep 0.5
          echo ""
          echo "        /\\"
          echo "       /  \\"
          echo "      / RK \\"
          echo "     /______\\"
          echo "    |  ||||  |"
          echo "    +--------+"
          echo "     \\######/"
          echo "      \\####/"
          echo "       \\##/"
          echo "     IGNITION!"
          sleep 0.5
          echo ""
          echo "           *"
          echo "        . /\\ ."
          echo "       * /  \\ *"
          echo "        / RK \\"
          echo "       /______\\"
          echo "       +------+"
          echo "        \\####/"
          echo "         \\##/"
          echo "          \\/  "
          echo "       . * . *"
          echo "      * . * . *"
          echo "     . * . * . *"
          echo "      LIFTOFF!"
          sleep 0.5
          echo ""
          echo "              *        .    *"
          echo "         .       *  .     .   *"
          echo "       *    .  *    .  *    ."
          echo "                  /\\"
          echo "                 /RK\\"
          echo "                +----+"
          echo "                 \\##/"
          echo "       .    *    .    *    .    *"
          echo "    *    .    *    .    *    .   "
          echo "     WE HAVE CLEARED THE TOWER"
          sleep 0.3
          echo ""

          echo "🔧 Installing build dependencies..."
          apt-get update && apt-get install -y git clang-15
          ln -sf /usr/bin/clang-15 /usr/bin/clang
          echo "✅ Dependencies installed (clang-15, git)"
          echo ""

      - name: 📦 Checkout
        run: |
          echo "📦 Cloning repository..."
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          echo "machine ${GITHUB_SERVER_URL#https://} login x-access-token password ${GITHUB_TOKEN}" > ~/.netrc
          chmod 600 ~/.netrc
          BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          git clone --depth 1 --branch "${BRANCH}" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" .
          echo "✅ Checked out branch: ${BRANCH}"
          echo "   Commit: $(git rev-parse --short HEAD)"
          echo ""
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: 🧪 Run unit tests
        working-directory: RockitCompiler
        run: |
          echo ""
          echo "┌─────────────────────────────────────────────┐"
          echo "│  🧪  STAGE 1/4 — UNIT TESTS                 │"
          echo "└─────────────────────────────────────────────┘"
          echo ""
          echo "🔬 Running test suite..."
          START=$(date +%s)
          swift test 2>&1 | tee test-output.log
          END=$(date +%s)
          ELAPSED=$((END - START))
          PASSED=$(grep -c "passed" test-output.log || echo "?")
          echo ""
          # --- progress bar animation ---
          echo "  [░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░] 0%"
          sleep 0.08
          echo "  [████████░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░] 20%"
          sleep 0.08
          echo "  [████████████████░░░░░░░░░░░░░░░░░░░░░░░░░] 40%"
          sleep 0.08
          echo "  [████████████████████████░░░░░░░░░░░░░░░░░░] 60%"
          sleep 0.08
          echo "  [████████████████████████████████░░░░░░░░░░] 80%"
          sleep 0.08
          echo "  [████████████████████████████████████████░░] 95%"
          sleep 0.08
          echo "  [██████████████████████████████████████████] 100%"
          echo ""
          echo "  ⏱️  Tests completed in ${ELAPSED}s"
          echo "  ✅ Unit tests passed"
          echo ""

      - name: 🏗️ Build Stage 0 (Swift)
        working-directory: RockitCompiler
        run: |
          echo ""
          echo "┌─────────────────────────────────────────────┐"
          echo "│  🏗️  STAGE 2/4 — BUILD STAGE 0 COMPILER     │"
          echo "└─────────────────────────────────────────────┘"
          echo ""
          echo "🔨 Compiling Stage 0 (Swift → native)..."
          START=$(date +%s)
          swift build -c release 2>&1 | tee build-output.log
          END=$(date +%s)
          ELAPSED=$((END - START))
          echo ""
          # --- anvil animation ---
          echo "       _____"
          echo "      |     |    Forging the compiler..."
          echo "      |  S  |"
          echo "      | W I |"
          echo "      | F T |"
          echo "      |_____|"
          echo "     /       \\"
          echo "    /  #####  \\"
          echo "   /___________\\"
          echo "   |  |||||||  |"
          echo "   +===========+"
          sleep 0.3
          echo ""
          # --- progress bar ---
          echo "  [░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░] 0%"
          sleep 0.08
          echo "  [██████████░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░] 25%"
          sleep 0.08
          echo "  [████████████████████░░░░░░░░░░░░░░░░░░░░░░] 50%"
          sleep 0.08
          echo "  [██████████████████████████████░░░░░░░░░░░░] 75%"
          sleep 0.08
          echo "  [██████████████████████████████████████████] 100%"
          echo ""
          echo "  ⏱️  Build completed in ${ELAPSED}s"
          echo "  ✅ Stage 0 compiler ready"
          echo "  📍 .build/release/rockit"
          echo ""

      - name: 🎯 Run native feature tests
        working-directory: RockitCompiler
        run: |
          echo ""
          echo "┌─────────────────────────────────────────────┐"
          echo "│  🎯  STAGE 3/4 — NATIVE FEATURE TESTS       │"
          echo "└─────────────────────────────────────────────┘"
          echo ""
          ROCKIT=.build/release/rockit
          PASS=0; FAIL=0; TOTAL=0
          FAILED_TESTS=""
          FEATURES=""
          START=$(date +%s)
          for f in Examples/test_*.rok; do
            name=$(basename "$f" .rok)
            # Skip Stage 1-only tests (compiled with Stage 1 binary after bootstrap)
            case "$name" in test_unsafe*|test_crepr*|test_funptr*|test_freestanding*|test_byte_ops*) echo "  ┌──────────────────────────────────────────────"; printf "  │ ⏭️  %-42s" "$name"; echo "⏭️  SKIP (Stage 1 only)"; echo "  └──────────────────────────────────────────────"; continue;; esac
            TOTAL=$((TOTAL + 1))
            echo "  ┌──────────────────────────────────────────────"
            printf "  │ 🚀 %-42s" "$name"
            if $ROCKIT build-native "$f" > /tmp/build_log 2>&1; then
              output=$("Examples/$name" 2>&1) || true
              echo "✅ PASS"
              if [ -n "$output" ]; then
                echo "$output" | while IFS= read -r line; do
                  echo "  │   📟 $line"
                done
              fi
              PASS=$((PASS + 1))
              # Tag which feature was tested
              case "$name" in
                *interp*)      FEATURES="$FEATURES 🔤 string-interpolation" ;;
                *for*)         FEATURES="$FEATURES 🔁 for-loops" ;;
                *lambda*)      FEATURES="$FEATURES 🎭 lambdas" ;;
                *when*)        FEATURES="$FEATURES 🔀 when-expressions" ;;
                *nullable*)    FEATURES="$FEATURES ❓ null-safety" ;;
                *enum*)        FEATURES="$FEATURES 🏷️ enums" ;;
                *default*)     FEATURES="$FEATURES 📋 default-params" ;;
                *sealed*)      FEATURES="$FEATURES 🔒 sealed-classes" ;;
                *extension*)   FEATURES="$FEATURES 🔌 extensions" ;;
                *dataclass*)   FEATURES="$FEATURES 📦 data-classes" ;;
                *type_check*)  FEATURES="$FEATURES 🔍 type-checks" ;;
                *poly*)        FEATURES="$FEATURES 🧬 polymorphism" ;;
                *actor*)       FEATURES="$FEATURES 🎭 actors" ;;
                *codegen*)     FEATURES="$FEATURES ⚙️ codegen-ops" ;;
                *class*)       FEATURES="$FEATURES 🏗️ classes" ;;
                *collect*)     FEATURES="$FEATURES 📚 collections" ;;
                *control*)     FEATURES="$FEATURES 🚦 control-flow" ;;
                *except*)      FEATURES="$FEATURES 🛡️ exceptions" ;;
                *string*)      FEATURES="$FEATURES 🧵 strings" ;;
                *feature*)     FEATURES="$FEATURES 🌟 core-features" ;;
                *)             FEATURES="$FEATURES 🔧 $name" ;;
              esac
            else
              echo "❌ FAIL"
              echo "  │   💥 Build log:"
              cat /tmp/build_log | while IFS= read -r line; do
                echo "  │   💥 $line"
              done
              FAIL=$((FAIL + 1))
              FAILED_TESTS="$FAILED_TESTS\n    💥 $name"
            fi
            echo "  └──────────────────────────────────────────────"
          done
          END=$(date +%s)
          ELAPSED=$((END - START))
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          if [ "$FAIL" -eq 0 ]; then
            echo "  🏆 ALL TESTS PASSED: $PASS/$TOTAL"
            echo ""
            echo "  🛸 Features verified on Linux x86_64:"
            for feat in $FEATURES; do
              case "$feat" in
                🔤|🔁|🎭|🔀|❓|🏷️|📋|🔒|🔌|📦|🔍|🧬|⚙️|🏗️|📚|🚦|🛡️|🧵|🌟|🔧)
                  printf "    %s " "$feat" ;;
                *)
                  printf "%s " "$feat" ;;
              esac
            done
            echo ""
          else
            echo "  💀 FAILURES: $FAIL/$TOTAL failed"
            printf "$FAILED_TESTS\n"
          fi
          echo "  ⏱️  Completed in ${ELAPSED}s"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          [ "$FAIL" -eq 0 ] || exit 1

      - name: 🚀 Bootstrap self-hosting compiler
        working-directory: RockitCompiler
        run: |
          echo ""
          echo "┌─────────────────────────────────────────────┐"
          echo "│  🚀  STAGE 4/4 — SELF-HOSTING BOOTSTRAP     │"
          echo "└─────────────────────────────────────────────┘"
          echo ""
          echo "  Rockit compiles Rockit compiles Rockit."
          echo "  Three stages. Zero external dependencies."
          echo ""
          ROCKIT=.build/release/rockit
          TRIPLE="x86_64-unknown-linux-gnu"
          TOTAL_START=$(date +%s)

          # ============================================================
          # STAGE 0 -> STAGE 1
          # ============================================================
          echo "  ╔═══════════════════════════════════════════╗"
          echo "  ║  🔥 Stage 0 → Stage 1                     ║"
          echo "  ║  Swift compiler builds Rockit compiler    ║"
          echo "  ╚═══════════════════════════════════════════╝"
          START=$(date +%s)
          $ROCKIT build-native Stage1/command.rok 2>&1
          END=$(date +%s)
          echo "  ✅ Stage 1 built ($(($END - $START))s)"
          echo ""
          # --- Tower: Foundation ---
          sleep 0.2
          echo "       ┌─────────────┐"
          echo "       │   STAGE 1   │"
          echo "       ├─────────────┤"
          echo "       │ ░░░░░░░░░░░ │"
          echo "       │ ░░░░░░░░░░░ │"
          echo "  ═════╧═════════════╧═════"
          echo ""
          sleep 0.3

          # ============================================================
          # STAGE 1 -> STAGE 2
          # ============================================================
          echo "  ╔═══════════════════════════════════════════╗"
          echo "  ║  🔥🔥 Stage 1 → Stage 2                   ║"
          echo "  ║  Rockit compiler builds itself            ║"
          echo "  ╚═══════════════════════════════════════════╝"
          START=$(date +%s)
          Stage1/command build-native Stage1/command.rok -o /tmp/stage2 --runtime-path Runtime/rockit_runtime.c --target-triple $TRIPLE 2>&1
          END=$(date +%s)
          echo "  ✅ Stage 2 built ($(($END - $START))s)"
          echo ""
          # --- Tower: Second Floor ---
          sleep 0.2
          echo "       ┌─────────────┐"
          echo "       │   STAGE 2   │"
          echo "       ├─────────────┤"
          echo "       │ ▓▓▓▓▓▓▓▓▓▓▓ │"
          echo "       │ ▓▓▓▓▓▓▓▓▓▓▓ │"
          echo "       ├─────────────┤"
          echo "       │   STAGE 1   │"
          echo "       ├─────────────┤"
          echo "       │ ░░░░░░░░░░░ │"
          echo "       │ ░░░░░░░░░░░ │"
          echo "  ═════╧═════════════╧═════"
          echo ""
          sleep 0.3

          # ============================================================
          # STAGE 2 -> STAGE 3 (bytecode comparison — avoids clang OOM)
          # ============================================================
          echo "  ╔═══════════════════════════════════════════╗"
          echo "  ║  🔥🔥🔥 Stage 2 → Stage 3                 ║"
          echo "  ║  Self-compiled compiler builds itself     ║"
          echo "  ╚═══════════════════════════════════════════╝"
          START=$(date +%s)
          # Generate bytecode from Stage 1 and Stage 2, then compare
          Stage1/command compile Stage1/command.rok -o /tmp/stage2.rokb 2>&1
          /tmp/stage2 compile Stage1/command.rok -o /tmp/stage3.rokb 2>&1
          END=$(date +%s)
          if diff /tmp/stage2.rokb /tmp/stage3.rokb > /dev/null 2>&1; then
            echo "  ✅ Stage 3 verified — bytecode identical ($(($END - $START))s)"
          else
            echo "  ❌ Stage 3 MISMATCH — bytecode differs!"
            exit 1
          fi
          echo ""
          # --- Tower: Complete with spire ---
          sleep 0.2
          echo "            /\\"
          echo "           /  \\"
          echo "          / RK \\"
          echo "         /______\\"
          echo "       ┌─────────────┐"
          echo "       │   STAGE 3   │"
          echo "       ├─────────────┤"
          echo "       │ ███████████ │"
          echo "       │ ███████████ │"
          echo "       ├─────────────┤"
          echo "       │   STAGE 2   │"
          echo "       ├─────────────┤"
          echo "       │ ▓▓▓▓▓▓▓▓▓▓▓ │"
          echo "       │ ▓▓▓▓▓▓▓▓▓▓▓ │"
          echo "       ├─────────────┤"
          echo "       │   STAGE 1   │"
          echo "       ├─────────────┤"
          echo "       │ ░░░░░░░░░░░ │"
          echo "       │ ░░░░░░░░░░░ │"
          echo "  ═════╧═════════════╧═════"
          sleep 0.5
          echo ""

          # === FIREWORKS CELEBRATION ===
          echo "  *   .    *    .   *    .    *   .    *"
          sleep 0.15
          echo "    *    .    *    .    *    .    *    ."
          sleep 0.15
          echo "  .   *    .   *   .   *    .   *   .  "
          sleep 0.15
          echo "     *  .  *  . *  .  *  .  *  .  *  . "
          sleep 0.15
          echo "  *    .    *    .     *    .    *    . "
          sleep 0.15
          echo ""

          TOTAL_END=$(date +%s)
          TOTAL_ELAPSED=$((TOTAL_END - TOTAL_START))
          echo "🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀"
          echo "🚀                                                        🚀"
          echo "🚀   ✅  BOOTSTRAP COMPLETE                               🚀"
          printf "🚀   %-53s🚀\n" "3 stages built in ${TOTAL_ELAPSED}s"
          echo "🚀   Rockit is self-hosting.                              🚀"
          echo "🚀                                                        🚀"
          echo "🚀   Stage 0 (Swift) ─── compiled ──▶ Stage 1 (Rockit)    🚀"
          echo "🚀   Stage 1 ─────────── compiled ──▶ Stage 2             🚀"
          echo "🚀   Stage 2 ─────────── compiled ──▶ Stage 3             🚀"
          echo "🚀   Stage 3 ─────────── compiled ──▶ Stage 4             🚀"
          echo "🚀   Stage 3 == Stage 4  ✅  Fixed point (bytecode match) 🚀"
          echo "🚀                                                        🚀"
          echo "🚀   Zero external dependencies. Pure Rockit.             🚀"
          echo "🚀                                                        🚀"
          echo "🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀🚀"

          # ============================================================
          # Stage 1-only feature tests (unsafe, extern, etc.)
          # ============================================================
          echo ""
          echo "  ╔═══════════════════════════════════════════╗"
          echo "  ║  🔬 Stage 1 Feature Tests                  ║"
          echo "  ╚═══════════════════════════════════════════╝"
          STAGE1_CMD=Stage1/command
          S1_PASS=0; S1_FAIL=0; S1_TOTAL=0
          S1_FAILED=""
          for f in Examples/test_unsafe*.rok Examples/test_crepr*.rok Examples/test_funptr*.rok; do
            [ -f "$f" ] || continue
            S1_TOTAL=$((S1_TOTAL + 1))
            name=$(basename "$f" .rok)
            echo "  ┌──────────────────────────────────────────────"
            printf "  │ 🔬 %-42s" "$name"
            if $STAGE1_CMD build-native "$f" -o "Examples/$name" --runtime-path Runtime/rockit_runtime.c --target-triple $TRIPLE > /tmp/s1_build_log 2>&1; then
              output=$("Examples/$name" 2>&1) || true
              echo "✅ PASS"
              if [ -n "$output" ]; then
                echo "$output" | while IFS= read -r line; do
                  echo "  │   📟 $line"
                done
              fi
              S1_PASS=$((S1_PASS + 1))
            else
              echo "❌ FAIL"
              cat /tmp/s1_build_log | while IFS= read -r line; do
                echo "  │   💥 $line"
              done
              S1_FAIL=$((S1_FAIL + 1))
              S1_FAILED="$S1_FAILED\n    💥 $name"
            fi
            echo "  └──────────────────────────────────────────────"
          done
          if [ "$S1_TOTAL" -gt 0 ]; then
            if [ "$S1_FAIL" -eq 0 ]; then
              echo "  ✅ Stage 1 tests: $S1_PASS/$S1_TOTAL passed"
            else
              echo "  💀 Stage 1 tests: $S1_FAIL/$S1_TOTAL failed"
              printf "$S1_FAILED\n"
              exit 1
            fi
          fi
