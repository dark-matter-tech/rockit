name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    container: swift:5.10.1-jammy

    steps:
      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y git clang-15 curl jq
          ln -sf /usr/bin/clang-15 /usr/bin/clang

      - name: Checkout
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          echo "machine ${GITHUB_SERVER_URL#https://} login x-access-token password ${GITHUB_TOKEN}" > ~/.netrc
          chmod 600 ~/.netrc
          git clone --depth 1 --branch "${GITHUB_REF_NAME}" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" .
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Build Stage 0 compiler
        working-directory: RockitCompiler
        run: swift build -c release

      - name: Build Stage 1 compiler
        working-directory: RockitCompiler
        run: |
          .build/release/rockit build-native Stage1/command.rok
          echo "Stage 1 compiler built"
          Stage1/command version

      - name: Clone and build Fuel
        run: |
          echo "machine ${GITHUB_SERVER_URL#https://} login x-access-token password ${FUEL_TOKEN}" > ~/.netrc
          chmod 600 ~/.netrc
          git clone --depth 1 --branch develop "${GITHUB_SERVER_URL}/Dark-Matter/fuel.git" /tmp/fuel
          RockitCompiler/Stage1/command build-native /tmp/fuel/src/fuel.rok -o /tmp/fuel/fuel --runtime-path RockitCompiler/Runtime/rockit_runtime.c
        env:
          FUEL_TOKEN: ${{ secrets.FUEL_TOKEN }}

      - name: Package Linux x86_64
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="rockit-${VERSION}-linux-x86_64.tar.gz"
          mkdir -p dist/rockit-${VERSION}-linux-x86_64/rockit/bin
          mkdir -p dist/rockit-${VERSION}-linux-x86_64/rockit/share/rockit
          cp RockitCompiler/Stage1/command dist/rockit-${VERSION}-linux-x86_64/rockit/bin/rockit
          cp /tmp/fuel/fuel dist/rockit-${VERSION}-linux-x86_64/rockit/bin/fuel
          chmod +x dist/rockit-${VERSION}-linux-x86_64/rockit/bin/rockit
          chmod +x dist/rockit-${VERSION}-linux-x86_64/rockit/bin/fuel
          cp RockitCompiler/Runtime/rockit_runtime.c dist/rockit-${VERSION}-linux-x86_64/rockit/share/rockit/
          cp RockitCompiler/Runtime/rockit_runtime.h dist/rockit-${VERSION}-linux-x86_64/rockit/share/rockit/
          cd dist && tar -czf "${ARCHIVE}" "rockit-${VERSION}-linux-x86_64"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          ls -la "${ARCHIVE}"

      - name: Create Gitea release and upload
        run: |
          GITEA_URL="${GITHUB_SERVER_URL}"
          API="${GITEA_URL}/api/v1"
          TAG="${GITHUB_REF_NAME}"

          # Create release
          RELEASE_ID=$(curl -s -X POST \
            -H "Authorization: token ${FUEL_TOKEN}" \
            -H "Content-Type: application/json" \
            "${API}/repos/${GITHUB_REPOSITORY}/releases" \
            -d "{
              \"tag_name\": \"${TAG}\",
              \"name\": \"Rockit ${TAG}\",
              \"body\": \"Release ${TAG} of the Rockit compiler and Fuel package manager.\\n\\n## Install\\n\\n\\\`\\\`\\\`bash\\ncurl -fsSL ${GITEA_URL}/${GITHUB_REPOSITORY}/raw/branch/develop/RockitCompiler/install.sh | bash\\n\\\`\\\`\\\`\\n\\n## Platforms\\n\\n- Linux x86_64 (prebuilt)\\n- macOS arm64 (build from source)\\n- macOS x86_64 (build from source)\",
              \"draft\": false,
              \"prerelease\": false
            }" | jq -r '.id')

          echo "Release created: ID=${RELEASE_ID}"

          # Upload tarball
          curl -s -X POST \
            -H "Authorization: token ${FUEL_TOKEN}" \
            -H "Content-Type: application/gzip" \
            --data-binary "@dist/${ARCHIVE}" \
            "${API}/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=${ARCHIVE}"

          echo "Uploaded: ${ARCHIVE}"
        env:
          FUEL_TOKEN: ${{ secrets.FUEL_TOKEN }}
