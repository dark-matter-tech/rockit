name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - master
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.1)'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    container: swift:5.10.1-jammy

    steps:
      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y git clang-15 curl jq
          ln -sf /usr/bin/clang-15 /usr/bin/clang

      - name: Set version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
            echo "TAG=v${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
            echo "TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi

      - name: Checkout
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          echo "machine ${GITHUB_SERVER_URL#https://} login x-access-token password ${GITHUB_TOKEN}" > ~/.netrc
          chmod 600 ~/.netrc
          if [ -n "${GITHUB_REF_NAME}" ] && echo "${GITHUB_REF_NAME}" | grep -q "^v"; then
            # Tag push — check out the tag
            git clone --depth 1 --branch "${GITHUB_REF_NAME}" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" .
          else
            # Branch push (master merge) — check out master
            git clone --depth 1 --branch master "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" .
          fi
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Build Stage 0 compiler
        working-directory: RockitCompiler
        run: swift build -c release

      - name: Build Stage 1 compiler
        working-directory: RockitCompiler
        run: |
          .build/release/rockit build-native Stage1/command.rok
          echo "Stage 1 compiler built"
          Stage1/command version

      - name: Determine version
        run: |
          VERSION=$(RockitCompiler/Stage1/command version 2>&1 | grep -oP '[0-9]+\.[0-9]+\.[0-9]+')
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "TAG=v${VERSION}" >> "$GITHUB_ENV"
          echo "Detected version: ${VERSION}"

      - name: Check if release already exists
        run: |
          GITEA_URL="${GITHUB_SERVER_URL}"
          API="${GITEA_URL}/api/v1"

          # Check if a release with this tag already exists
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${FUEL_TOKEN}" \
            "${API}/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}")

          if [ "$STATUS" = "200" ]; then
            echo "Release ${TAG} already exists — skipping."
            echo "SKIP_RELEASE=true" >> "$GITHUB_ENV"
          else
            echo "No existing release for ${TAG} — proceeding."
            echo "SKIP_RELEASE=false" >> "$GITHUB_ENV"
          fi
        env:
          FUEL_TOKEN: ${{ secrets.FUEL_TOKEN }}

      - name: Build Rockit runtime
        if: env.SKIP_RELEASE != 'true'
        working-directory: RockitCompiler
        run: |
          cd Runtime/rockit
          bash build.sh

      - name: Clone and build Fuel
        if: env.SKIP_RELEASE != 'true'
        run: |
          echo "machine ${GITHUB_SERVER_URL#https://} login x-access-token password ${FUEL_TOKEN}" > ~/.netrc
          chmod 600 ~/.netrc
          git clone --depth 1 --branch develop "${GITHUB_SERVER_URL}/Dark-Matter/fuel.git" /tmp/fuel
          RockitCompiler/Stage1/command build-native /tmp/fuel/src/fuel.rok -o /tmp/fuel/fuel --runtime-path RockitCompiler/Runtime/rockit_runtime.o
        env:
          FUEL_TOKEN: ${{ secrets.FUEL_TOKEN }}

      - name: Package Linux x86_64
        if: env.SKIP_RELEASE != 'true'
        run: |
          ARCHIVE="rockit-${VERSION}-linux-x86_64.tar.gz"
          mkdir -p dist/rockit-${VERSION}-linux-x86_64/rockit/bin
          mkdir -p dist/rockit-${VERSION}-linux-x86_64/rockit/share/rockit
          cp RockitCompiler/Stage1/command dist/rockit-${VERSION}-linux-x86_64/rockit/bin/rockit
          chmod +x dist/rockit-${VERSION}-linux-x86_64/rockit/bin/rockit
          cp /tmp/fuel/fuel dist/rockit-${VERSION}-linux-x86_64/rockit/bin/fuel
          chmod +x dist/rockit-${VERSION}-linux-x86_64/rockit/bin/fuel
          cp RockitCompiler/Runtime/rockit_runtime.o dist/rockit-${VERSION}-linux-x86_64/rockit/share/rockit/
          # Standard library — recursive copy picks up all modules automatically
          cp -r RockitCompiler/Stage1/stdlib dist/rockit-${VERSION}-linux-x86_64/rockit/share/rockit/
          cd dist && tar -czf "${ARCHIVE}" "rockit-${VERSION}-linux-x86_64"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"
          ls -la "${ARCHIVE}"

      - name: Create tag (if triggered by master merge)
        if: env.SKIP_RELEASE != 'true'
        run: |
          # Create the tag via Gitea API (works even in containers without git push access)
          GITEA_URL="${GITHUB_SERVER_URL}"
          API="${GITEA_URL}/api/v1"
          SHA=$(git rev-parse HEAD)

          # Check if tag exists
          TAG_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${FUEL_TOKEN}" \
            "${API}/repos/${GITHUB_REPOSITORY}/git/refs/tags/${TAG}")

          if [ "$TAG_STATUS" != "200" ]; then
            echo "Creating tag ${TAG} at ${SHA}..."
            curl -s -X POST \
              -H "Authorization: token ${FUEL_TOKEN}" \
              -H "Content-Type: application/json" \
              "${API}/repos/${GITHUB_REPOSITORY}/tags" \
              -d "{\"tag_name\": \"${TAG}\", \"target\": \"${SHA}\"}"
            echo "Tag ${TAG} created."
          else
            echo "Tag ${TAG} already exists."
          fi
        env:
          FUEL_TOKEN: ${{ secrets.FUEL_TOKEN }}

      - name: Create Gitea release and upload
        if: env.SKIP_RELEASE != 'true'
        run: |
          GITEA_URL="${GITHUB_SERVER_URL}"
          API="${GITEA_URL}/api/v1"

          # Create release
          RELEASE_ID=$(curl -s -X POST \
            -H "Authorization: token ${FUEL_TOKEN}" \
            -H "Content-Type: application/json" \
            "${API}/repos/${GITHUB_REPOSITORY}/releases" \
            -d "{
              \"tag_name\": \"${TAG}\",
              \"name\": \"Rockit ${TAG}\",
              \"body\": \"Release ${TAG} of the Rockit compiler and Fuel package manager.\\n\\n## What's Included\\n\\n- **rockit** — The Rockit compiler (Stage 1, self-hosted)\\n- **fuel** — The Rockit package manager\\n- **stdlib** — Standard library (json, collections, math, strings, result, file)\\n- **rockit_runtime.o** — Prebuilt runtime\\n\\n## Install\\n\\n\\\`\\\`\\\`bash\\ncurl -fsSL ${GITEA_URL}/${GITHUB_REPOSITORY}/raw/branch/develop/RockitCompiler/install.sh | bash\\n\\\`\\\`\\\`\\n\\n## Platforms\\n\\n- Linux x86_64 (prebuilt)\\n- macOS arm64 (build from source)\\n- macOS x86_64 (build from source)\",
              \"draft\": false,
              \"prerelease\": false
            }" | jq -r '.id')

          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "ERROR: Failed to get/create release"
            exit 1
          fi

          # Upload tarball
          UPLOAD_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: token ${FUEL_TOKEN}" \
            -H "Content-Type: application/gzip" \
            --data-binary "@dist/${ARCHIVE}" \
            "${API}/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=${ARCHIVE}")
          HTTP_CODE=$(echo "$UPLOAD_RESPONSE" | tail -1)
          BODY=$(echo "$UPLOAD_RESPONSE" | head -n -1)

          echo "Upload response (HTTP $HTTP_CODE):"
          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "ERROR: Upload failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "Successfully uploaded: ${ARCHIVE}"
        env:
          FUEL_TOKEN: ${{ secrets.FUEL_TOKEN }}
