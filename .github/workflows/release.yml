name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  SWIFT_VERSION: "5.10.1"

jobs:
  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        working-directory: RockitCompiler
        run: swift build -c release

      - name: Package
        working-directory: RockitCompiler
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="rockit-${VERSION}-macos-arm64.tar.gz"
          mkdir -p dist/rockit/runtime
          cp .build/release/rockit dist/rockit/
          cp Runtime/rockit_runtime.c dist/rockit/runtime/
          cp Runtime/rockit_runtime.h dist/rockit/runtime/
          mkdir -p dist/rockit/editors/vscode dist/rockit/editors/vim
          cp -r ../ide/vscode/* dist/rockit/editors/vscode/
          cp -r ../ide/vim/* dist/rockit/editors/vim/
          tar -czf "$ARCHIVE" -C dist rockit
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: RockitCompiler/${{ env.ARCHIVE }}

  build-macos-x86_64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        working-directory: RockitCompiler
        run: swift build -c release

      - name: Package
        working-directory: RockitCompiler
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="rockit-${VERSION}-macos-x86_64.tar.gz"
          mkdir -p dist/rockit/runtime
          cp .build/release/rockit dist/rockit/
          cp Runtime/rockit_runtime.c dist/rockit/runtime/
          cp Runtime/rockit_runtime.h dist/rockit/runtime/
          mkdir -p dist/rockit/editors/vscode dist/rockit/editors/vim
          cp -r ../ide/vscode/* dist/rockit/editors/vscode/
          cp -r ../ide/vim/* dist/rockit/editors/vim/
          tar -czf "$ARCHIVE" -C dist rockit
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64
          path: RockitCompiler/${{ env.ARCHIVE }}

  build-linux-x86_64:
    runs-on: ubuntu-22.04
    container: swift:5.10.1-jammy
    steps:
      - name: Install dependencies
        run: apt-get update && apt-get install -y git clang-15 && ln -sf /usr/bin/clang-15 /usr/bin/clang

      - name: Checkout
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          echo "machine ${GITHUB_SERVER_URL#https://} login x-access-token password ${GITHUB_TOKEN}" > ~/.netrc
          chmod 600 ~/.netrc
          git clone --depth 1 --branch "${GITHUB_REF_NAME}" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" .
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Build release binary
        working-directory: RockitCompiler
        run: swift build -c release

      - name: Package
        working-directory: RockitCompiler
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="rockit-${VERSION}-linux-x86_64.tar.gz"
          mkdir -p dist/rockit/runtime
          cp .build/release/rockit dist/rockit/
          cp Runtime/rockit_runtime.c dist/rockit/runtime/
          cp Runtime/rockit_runtime.h dist/rockit/runtime/
          mkdir -p dist/rockit/editors/vscode dist/rockit/editors/vim
          cp -r ../ide/vscode/* dist/rockit/editors/vscode/
          cp -r ../ide/vim/* dist/rockit/editors/vim/
          tar -czf "$ARCHIVE" -C dist rockit
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: RockitCompiler/${{ env.ARCHIVE }}

  build-windows-x86_64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: compnerd/gha-setup-swift@main
        with:
          branch: swift-${{ env.SWIFT_VERSION }}-release
          tag: ${{ env.SWIFT_VERSION }}-RELEASE

      - name: Build release binary
        working-directory: RockitCompiler
        run: swift build -c release

      - name: Package
        working-directory: RockitCompiler
        shell: pwsh
        run: |
          $Version = "$env:GITHUB_REF_NAME" -replace '^v',''
          $Archive = "rockit-${Version}-windows-x86_64.zip"
          New-Item -ItemType Directory -Force -Path dist\rockit\runtime | Out-Null
          Copy-Item ".build\release\rockit.exe" "dist\rockit\"
          Copy-Item "Runtime\rockit_runtime.c" "dist\rockit\runtime\"
          Copy-Item "Runtime\rockit_runtime.h" "dist\rockit\runtime\"
          New-Item -ItemType Directory -Force -Path dist\rockit\editors\vscode | Out-Null
          New-Item -ItemType Directory -Force -Path dist\rockit\editors\vim | Out-Null
          Copy-Item "..\ide\vscode\*" "dist\rockit\editors\vscode\" -Recurse
          Copy-Item "..\ide\vim\*" "dist\rockit\editors\vim\" -Recurse
          Compress-Archive -Path "dist\rockit" -DestinationPath $Archive
          "ARCHIVE=$Archive" | Out-File -FilePath $env:GITHUB_ENV -Append

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: RockitCompiler/${{ env.ARCHIVE }}

  create-release:
    needs: [build-macos-arm64, build-macos-x86_64, build-linux-x86_64, build-windows-x86_64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/macos-arm64/*
            artifacts/macos-x86_64/*
            artifacts/linux-x86_64/*
            artifacts/windows-x86_64/*
