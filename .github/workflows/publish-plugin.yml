name: Publish IntelliJ Plugin

on:
  push:
    tags:
      - 'plugin-v*'    # Triggered by: git tag plugin-v0.1.0 && git push --tags
  workflow_dispatch:     # Manual trigger from GitHub Actions UI

jobs:
  publish:
    name: Build & Publish to JetBrains Marketplace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin
        working-directory: ide/intellij-rockit
        run: ./gradlew buildPlugin

      - name: Verify plugin
        working-directory: ide/intellij-rockit
        run: ./gradlew verifyPlugin

      - name: Publish to JetBrains Marketplace
        working-directory: ide/intellij-rockit
        env:
          JETBRAINS_MARKETPLACE_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
        run: ./gradlew publishPlugin

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: intellij-rockit-plugin
          path: ide/intellij-rockit/build/distributions/*.zip

  # Also build the plugin on every push to verify it compiles
  build-only:
    name: Build Plugin (verify)
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin
        working-directory: ide/intellij-rockit
        run: ./gradlew buildPlugin
